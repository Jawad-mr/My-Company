<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="JSN Creative Logo">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#E2E2E7" />
      <stop offset="50%" stop-color="#9E9E9E" />
      <stop offset="70%" stop-color="#E2E2E7" />
      <stop offset="100%" stop-color="#757575" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="200" height="80" rx="6" fill="#000000" />
  <!-- Border Box -->
  <rect x="8" y="8" width="184" height="64" fill="none" stroke="url(#silverGrad)" stroke-width="3" />
  <!-- Divider -->
  <line x1="126" y1="8" x2="126" y2="72" stroke="url(#silverGrad)" stroke-width="3" />
  <!-- Left text JSN -->
  <text x="67" y="57" font-family="'Impact', 'Arial Black', sans-serif" font-size="49" font-weight="900" fill="url(#silverGrad)" text-anchor="middle" letter-spacing="-1">JSN</text>
  <!-- Right text CREA TIVE -->
  <text x="157" y="35" font-family="'Impact', 'Arial Black', sans-serif" font-size="19" font-weight="900" fill="url(#silverGrad)" text-anchor="middle" letter-spacing="0.5">CREA</text>
  <text x="157" y="58" font-family="'Impact', 'Arial Black', sans-serif" font-size="19" font-weight="900" fill="url(#silverGrad)" text-anchor="middle" letter-spacing="0.5">TIVE</text>
</svg>
